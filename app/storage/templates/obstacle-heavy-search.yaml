    experiment_num_seeds: 1
    strategies:
    - random_sweep
    - sector_search
    - probability_greedy
    - auction_based
    - information_gain
    target_behaviors:
    - terrain_biased
    - stationary_intervals
    coordination_modes:
    - centralized
    - decentralized
    drone_counts:
    - 4
    battery_budgets:
    - 120.0
    - 80.0
    sensor_modes:
    - thermal_visual
    scenario_families:
    - open_terrain
    - layered_demo
    output_dir: outputs
