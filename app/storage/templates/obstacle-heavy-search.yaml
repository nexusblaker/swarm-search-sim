scenario:
  map_size:
  - 18
  - 14
  weather: clear
  num_drones: 5
  last_known_position:
  - 9
  - 7
  target_assumptions:
    behavior: terrain_biased
    target_move_probability: 0.42
    target_speed: 1
    drift_sigma: 4.5
  max_steps: 45
  strategy: auction_based
  seed: 7
  scenario_family: obstacle_heavy
  deployment_mode: base_launch
  base_position:
  - 1
  - 1
