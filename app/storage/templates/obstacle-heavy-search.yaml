    elevation: data/sample_layers/elevation.csv
    wind: data/sample_layers/wind.csv
  terrain:
    obstacle_ratio: 0.16
    distribution:
      plain: 0.42
      forest: 0.24
      hill: 0.16
      urban: 0.12
      water: 0.06
  drone:
    battery: 120.0
    speed: 1
    sensor_range: 5.0
    fov: 130.0
  sensor:
    mode: thermal_visual
    false_positive_rate: 0.02
    false_negative_rate: 0.08
