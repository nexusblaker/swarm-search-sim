services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      SWARM_STORAGE_ROOT: app/storage
      SWARM_DB_PATH: app/storage/swarm_product.db

  frontend:
    build:
      context: ./app/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
