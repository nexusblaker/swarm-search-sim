services:
  backend:
    build: .
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      SWARM_STORAGE_ROOT: app/storage
      SWARM_DB_PATH: app/storage/swarm_product.db

  frontend:
    build: .
    command: python -m streamlit run app/frontend/app.py --server.address 0.0.0.0 --server.port 8501 --server.headless true
    ports:
      - "8501:8501"
    environment:
      SWARM_FRONTEND_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
