scenario:
  map_size: [40, 30]
  weather: clear
  num_drones: 4
  last_known_position: [20, 15]
  target_initial_position: [24, 17]
  max_steps: 60
  strategy: probability_greedy
  seed: 11
  target_assumptions:
    mobility: medium
    drift_sigma: 5.5
    target_move_probability: 0.4
  drone:
    battery: 125.0
    speed: 1
    sensor_range: 5.0
    fov: 120.0
  terrain:
    obstacle_ratio: 0.05
    distribution:
      plain: 0.45
      forest: 0.2
      hill: 0.15
      urban: 0.15
      water: 0.05
  sensor:
    false_positive_rate: 0.02
    false_negative_rate: 0.08
    weather_modifiers:
      clear: 1.0
      windy: 0.9
      rain: 0.75
      storm: 0.55
